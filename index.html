<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>纪老师 F4 ACC 精英训练网</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: auto;
      text-align: center;
      padding: 10px;
    }

    #welcome, #quiz, #finish {
      margin: 20px;
    }

    #quiz, #finish {
      display: none;
    }

    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    #topbar .left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    progress {
      width: 100%;
      height: 18px;
    }

    .question {
      text-align: left;
      margin: 15px 0;
      padding: 10px;
      border: 1px solid #e6e6e6;
      border-radius: 12px;
      background: #fff;
    }

    .option-label {
      display: block;
      margin: 8px 0;
      cursor: pointer;
      line-height: 1.5;
    }

    .feedback {
      font-weight: bold;
      margin: 12px 0;
      line-height: 1.6;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
      box-sizing: border-box;
      font-size: 16px;
    }

    input[type="radio"], input[type="checkbox"] {
      transform: scale(1.2);
      margin-right: 8px;
    }

    img {
      max-width: 100%;
      margin: 10px 0;
      border: 2px solid #ccc;
      border-radius: 8px;
    }

    button {
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #000;
      color: #fff;
      cursor: pointer;
      font-size: 15px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #submit-status {
      margin-top: 10px;
      font-size: 14px;
    }

    .hint-box {
      max-width: 700px;
      margin: 60px auto;
      padding: 24px;
      text-align: center;
      border: 1px solid #ddd;
      border-radius: 16px;
      background: #fff;
    }

    .small-note {
      margin-top: 10px;
      color: #666;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div id="welcome">
    <h2 id="welcomeTitle"></h2>
    <p id="setInfo" style="font-weight:bold;"></p>
    <input type="text" id="username" placeholder="姓名 / Name"/>
    <button id="startBtn" type="button">开始 / Start</button>
    <div class="small-note">
      这是老师指定的专属练习链接。<br>
      你只能完成这一份练习。
    </div>
  </div>

  <div id="quiz">
    <div id="topbar">
      <div class="left">
        <span id="quiz-title" style="font-weight:bold;"></span>
      </div>
      <div class="right">
        <span id="score">得分: 0</span>
        <span id="remaining" style="margin-left:10px;">剩余题目: 0</span>
      </div>
    </div>

    <progress id="progress" value="0" max="0"></progress>
    <div id="question-area"></div>
  </div>

  <div id="finish">
    <h3 id="finish-msg"></h3>
    <p id="stats"></p>
    <p id="submit-status"></p>
    <div id="controls"></div>
  </div>

  <!-- 成绩上传隐藏表单 -->
  <iframe name="postFrame" style="display:none;"></iframe>
  <form id="postForm"
        action="https://script.google.com/macros/s/AKfycbwOadAK74XfAiOFkokD6zlQ8kQZTFDI0_SVWwMSSRgT8mwuoCac2VSAIj8X07L7NVVF/exec"
        method="post" target="postFrame" style="display:none;">
    <input name="book"/>
    <input name="quizId"/>
    <input name="name"/>
    <input name="score"/>
    <input name="correct"/>
    <input name="wrong"/>
    <input name="time"/>
  </form>

<script>
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('welcomeTitle').textContent = document.title;

  const params = new URLSearchParams(location.search);
  const SET_ID = (params.get('set') || '').trim();

  // 必须带 ?set=xxx 才能进入
  if (!SET_ID) {
    document.body.innerHTML = `
      <div class="hint-box">
        <h2>这个页面不能直接进入</h2>
        <p>请使用老师提供的专属练习链接。</p>
      </div>
    `;
    throw new Error('Missing set parameter');
  }

  let user = '';
  let rows = [];
  let idKey, chapterKey, labelKey, sheetKey;

  let currentRow = null;
  let qs = [];
  let queue = [];
  let score = 0;
  let correct = 0;
  let wrong = 0;
  let chapterStart = 0;

  const MAX_OPTS = 15;
  const SCRIPT_URL = document.getElementById('postForm').action;

  document.getElementById('startBtn').onclick = () => {
    const nm = document.getElementById('username').value.trim();
    if (!nm) return alert('请输入姓名');
    user = nm;
    document.getElementById('welcome').style.display = 'none';
    loadChaptersAndStart();
  };

  function loadChaptersAndStart() {
    Papa.parse('Chapters.csv', {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete(res) {
        rows = res.data.map(raw => {
          const r = {};
          Object.entries(raw).forEach(([k, v]) => {
            r[k.trim()] = v?.toString()?.trim() ?? v;
          });
          return r;
        });

        if (!rows.length) {
          alert('请检查 Chapters.csv');
          return;
        }

        const keys = Object.keys(rows[0]).map(k => k.trim());
        idKey = keys.find(k => k.toLowerCase() === 'id');
        chapterKey = keys.find(k => k.toLowerCase() === 'chapter');
        labelKey = keys.find(k => k.toLowerCase() === 'label');
        sheetKey = keys.find(k => k.toLowerCase() === 'sheet');

        if (!idKey || !chapterKey || !labelKey || !sheetKey) {
          alert('Chapters.csv 需要列：id, chapter, label, sheet');
          return;
        }

        const row = rows.find(r => String(r[idKey] || '').trim() === SET_ID);

        if (!row) {
          document.body.innerHTML = `
            <div class="hint-box">
              <h2>链接无效</h2>
              <p>找不到这个练习编号：${escapeHtml(SET_ID)}</p>
            </div>
          `;
          return;
        }

        currentRow = row;
        document.getElementById('setInfo').textContent =
          `${row[chapterKey]}${row[labelKey] ? ' — ' + row[labelKey] : ''}`;

        startQuiz(row);
      },
      error() {
        alert('Chapters.csv 加载失败，请确认文件存在于同目录。');
      }
    });
  }

  function startQuiz(row) {
    currentRow = row;

    document.getElementById('quiz-title').textContent =
      `${row[chapterKey]}${row[labelKey] ? ' — ' + row[labelKey] : ''}`;

    score = 0;
    correct = 0;
    wrong = 0;
    chapterStart = Date.now();

    Papa.parse(row[sheetKey], {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete(res) {
        qs = res.data
          .map(q => ({ ...q, attempt: 0 }))
          .filter(q => q.question && String(q.question).trim());

        if (!qs.length) {
          alert('这份练习没有题目，请检查 CSV。');
          location.reload();
          return;
        }

        queue = shuffle([...qs]);
        document.getElementById('quiz').style.display = 'block';
        updateUI(0);
        nextQ();
      },
      error() {
        alert('这个章节的题目加载失败了，请检查题库 CSV 路径。');
        location.reload();
      }
    });
  }

  function updateUI(delta) {
    document.getElementById('score').textContent =
      `得分: ${score}${delta ? ' (' + (delta > 0 ? '+' : '') + delta + ')' : ''}`;
    document.getElementById('remaining').textContent = `剩余题目: ${queue.length}`;

    const pg = document.getElementById('progress');
    pg.max = qs.length;
    pg.value = qs.length - queue.length;
  }

  function nextQ() {
    const qa = document.getElementById('question-area');
    qa.innerHTML = '';
    updateUI(0);

    if (queue.length === 0) {
      finishQuiz();
      return;
    }

    const q = queue.shift();
    const div = document.createElement('div');
    div.className = 'question';

    div.innerHTML = `<p><strong>${String(q.question || '').replace(/\r?\n/g, '<br>')}</strong></p>`;

    if (q.image) {
      const img = document.createElement('img');
      img.src = String(q.image).trim();
      div.appendChild(img);
    }

    const opts = document.createElement('div');
    opts.className = 'options';

    if (q.type === 'text') {
      opts.innerHTML = '<input type="text" id="txtAns" placeholder="请输入答案…"/>';
    } else {
      const letters = Array.from({ length: MAX_OPTS }, (_, i) => String.fromCharCode(65 + i));
      const availableLetters = letters.filter(l => q[l] && String(q[l]).trim());

      shuffle([...availableLetters]).forEach(l => {
        const inp = document.createElement('input');
        inp.type = (q.type === 'checkbox' ? 'checkbox' : 'radio');
        inp.name = 'opt';
        inp.value = l;
        inp.id = 'opt_' + l;

        const lbl = document.createElement('label');
        lbl.className = 'option-label';
        lbl.htmlFor = 'opt_' + l;

        lbl.appendChild(inp);
        lbl.append(' ' + q[l]);

        opts.appendChild(lbl);
      });
    }

    div.appendChild(opts);

    const fb = document.createElement('div');
    fb.className = 'feedback';
    div.appendChild(fb);

    const sb = document.createElement('button');
    sb.textContent = '提交';

    sb.onclick = () => {
      let ua = [];

      if (q.type === 'text') {
        ua = document.getElementById('txtAns').value
          .split(',')
          .map(s => s.trim())
          .filter(Boolean);
      } else {
        ua = Array.from(div.querySelectorAll('input[name="opt"]:checked'))
          .map(i => i.value);
      }

      if (!ua.length) return alert('请选择或输入答案');

      let isCorrect = false;

      if (q.type === 'text') {
        const lows = ua.map(s => s.toLowerCase());
        const ansList = String(q.answer || '')
          .split(',')
          .map(s => s.trim().toLowerCase())
          .filter(Boolean);

        isCorrect = lows.some(v => ansList.includes(v));

      } else if (q.type === 'checkbox') {
        const uaA = ua.map(s => s.toUpperCase()).sort().join(',');
        const caA = String(q.answer || '')
          .split(',')
          .map(s => s.trim().toUpperCase())
          .filter(Boolean)
          .sort()
          .join(',');

        isCorrect = uaA === caA;

      } else {
        const accept = String(q.answer || '')
          .split(',')
          .map(s => s.trim().toUpperCase())
          .filter(Boolean);

        isCorrect = (ua.length === 1 && accept.includes(ua[0].toUpperCase()));
      }

      const allAnsHtml = (() => {
        if (q.type === 'text') {
          return String(q.answer || '')
            .split(',')
            .map(s => s.trim())
            .filter(Boolean)
            .map((s, i) => `${i + 1}. ${escapeHtml(s)}`)
            .join('<br>');
        }

        return String(q.answer || '')
          .split(',')
          .map(s => s.trim().toUpperCase())
          .filter(Boolean)
          .map(letter => escapeHtml(q[letter] || letter))
          .join('<br>');
      })();

      const delta = isCorrect ? (q.attempt ? 1 : 2) : (q.attempt ? -2 : -1);

      score += delta;
      if (isCorrect) {
        correct++;
      } else {
        wrong++;
      }

      const explainLine = q.explain
        ? `<br><span style="font-weight:normal">${escapeHtml(String(q.explain))}</span>`
        : '';

      fb.innerHTML = isCorrect
        ? `正确! +${delta}<br>正确答案：<br>${allAnsHtml}${explainLine}`
        : `错误! ${delta}<br>正确答案：<br>${allAnsHtml}${explainLine}`;

      updateUI(delta);
      sb.disabled = true;

      const nb = document.createElement('button');
      nb.textContent = '下一题';
      nb.onclick = nextQ;
      div.appendChild(nb);

      if (!isCorrect) {
        q.attempt++;
        for (let i = 0; i < 2; i++) {
          queue.splice(Math.floor(Math.random() * (queue.length + 1)), 0, { ...q });
        }
      }
    };

    div.appendChild(sb);
    document.getElementById('question-area').appendChild(div);
  }

  async function finishQuiz() {
    document.getElementById('quiz').style.display = 'none';
    document.getElementById('finish').style.display = 'block';

    document.getElementById('finish-msg').textContent = `恭喜 ${user}，你完成这份练习了！`;
    document.getElementById('stats').textContent =
      `得分: ${score}，答对 ${correct} 题，答错 ${wrong} 题`;

    document.getElementById('submit-status').textContent = '正在上传成绩…';

    const m = document.title.match(/(F\d+\s+(?:SC|ACC))/i);
    const book = m ? m[1].toUpperCase() : 'DEFAULT';

    const payload = {
      book: book,
      quizId: currentRow[chapterKey],
      name: user,
      score: score,
      correct: correct,
      wrong: wrong,
      time: Math.floor((Date.now() - chapterStart) / 1000)
    };

    try {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: new URLSearchParams(payload)
      });

      if (!res.ok) throw new Error(res.status + ' ' + res.statusText);

      document.getElementById('submit-status').textContent = '✅ 成绩已上传';
    } catch (e) {
      const form = document.getElementById('postForm');
      form.book.value = payload.book;
      form.quizId.value = payload.quizId;
      form.name.value = payload.name;
      form.score.value = payload.score;
      form.correct.value = payload.correct;
      form.wrong.value = payload.wrong;
      form.time.value = payload.time;
      form.submit();

      document.getElementById('submit-status').textContent =
        '⚠️ 成绩可能没有上传成功，请老师检查表格链接/权限';
      console.error('Score upload failed:', e);
    }

    const ctrl = document.getElementById('controls');
    ctrl.innerHTML = '';

    const again = document.createElement('button');
    again.textContent = '再做一次';
    again.onclick = () => location.reload();
    ctrl.appendChild(again);
  }

  function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
});
</script>
</body>
</html>
